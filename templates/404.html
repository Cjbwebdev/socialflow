{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f8fafc; color: #1e293b; }
        .container { text-align: center; padding: 3rem 1rem; }
        .error-code { font-size: 6rem; font-weight: 800; color: #3b82f6; line-height: 1; }
        h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        p { color: #64748b; margin-bottom: 2rem; }
        a { display: inline-block; padding: 0.7rem 2rem; background: #3b82f6; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
        a:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
