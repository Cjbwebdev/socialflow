{% extends "base.html" %}
{% block title %}Create Post — SocialFlow{% endblock %}
{% block content %}
<section style="padding:40px 0">
<div class="container" style="max-width:640px">
<div class="card">
<h2 style="margin-bottom:24px">Create New Post</h2>
{% for msg in messages %}<div class="msg {% if msg.level == 40 %}msg-error{% else %}msg-success{% endif %}">{{ msg }}</div>{% endfor %}
<form method="post">
{% csrf_token %}
<div class="form-group">
<label>Content</label>
<textarea name="content" required placeholder="Write your post here..."></textarea>
</div>
<div class="form-group">
<label>Schedule (optional)</label>
<input type="datetime-local" name="scheduled_at" value="{{ now }}" min="{{ now }}">
</div>
<div class="form-group">
<label>Platforms</label>
<label style="font-weight:normal;display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;">
<label>
    <input type="checkbox" name="platforms" value="twitter" {% if 'twitter' not in connected_platforms %}disabled{% else %}checked{% endif %}> Twitter/X
    {% if 'twitter' not in connected_platforms %}<span style="color:#9ca3af;font-size:0.85rem;display:block;">Connect first</span>{% endif %}
</label>
<label>
    <input type="checkbox" name="platforms" value="linkedin" {% if 'linkedin' not in connected_platforms %}disabled{% else %}checked{% endif %}> LinkedIn
    {% if 'linkedin' not in connected_platforms %}<span style="color:#9ca3af;font-size:0.85rem;display:block;">Connect first</span>{% endif %}
</label>
<label>
    <input type="checkbox" name="platforms" value="instagram" disabled> Instagram
    <span style="color:#9ca3af;font-size:0.85rem;display:block;">Not supported yet</span>
</label>
</label>
</div>
<button type="submit" class="btn" style="width:100%">Create Post</button>
</form>
</div>
</div>
</section>
{% endblock %}
