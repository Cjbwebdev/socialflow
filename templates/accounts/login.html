{% extends "base.html" %}
{% block title %}Login — SocialFlow{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 120px);display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;background:var(--warm-white);">
    <div style="width:100%;max-width:400px;">
        <div class="text-center" style="margin-bottom:2rem;">
            <h2 style="font-family:var(--font-serif);font-size:1.5rem;font-weight:400;margin-bottom:0.25rem;">Welcome back</h2>
            <p style="color:var(--text-secondary);font-size:0.875rem;">Sign in to manage your posts.</p>
        </div>
        <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label style="display:block;font-size:0.8125rem;font-weight:600;margin-bottom:0.375rem;">Username</label>
                    <input type="text" name="username" style="width:100%;padding:0.625rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:0.875rem;font-family:var(--font-sans);" required autofocus>
                </div>
                <div class="form-group">
                    <label style="display:block;font-size:0.8125rem;font-weight:600;margin-bottom:0.375rem;">Password</label>
                    <input type="password" name="password" style="width:100%;padding:0.625rem 0.75rem;border:1px solid var(--border);border-radius:var(--radius);font-size:0.875rem;font-family:var(--font-sans);" required>
                </div>
                {% if form.errors %}<div class="msg msg-error" style="margin-bottom:0.75rem;">Invalid username or password.</div>{% endif %}
                <button type="submit" class="btn btn-accent" style="width:100%;margin-top:0.5rem;">Sign In</button>
            </form>
        </div>
        <p class="text-center text-sm text-secondary" style="margin-top:1rem;">
            Don't have an account? <a href="{% url 'accounts:register' %}" style="color:var(--accent);font-weight:500;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
