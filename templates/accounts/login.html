{% extends "base.html" %}
{% block title %}Login — SocialFlow{% endblock %}
{% block content %}
<div class="form-page">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            {% if form.errors %}<div class="msg msg-error">Invalid username or password.</div>{% endif %}
            <button type="submit" class="btn btn-dark" style="width:100%">Login</button>
        </form>
        <p class="text-center text-sm text-secondary" style="margin-top:1rem;">
            Don't have an account? <a href="{% url 'accounts:register' %}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
